<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chenabi Guy Links</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000000; 
            color: #ffffff; 
            text-align: center; 
            padding: 60px 20px; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .profile-container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 { 
            font-size: 20px; 
            margin: 0 0 12px 0; 
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .bio { 
            color: #8e8e93; 
            font-size: 14px;
            margin: 0 0 40px 0; 
            line-height: 1.6;
        }
        .section-title {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #636366;
            margin: 24px auto 12px auto;
            max-width: 100%;
            font-weight: 500;
        }
        .link-btn { 
            display: block; 
            background: #f2f2f7; 
            border: 1px solid #ffffff; 
            color: #000000; 
            text-decoration: none; 
            padding: 16px; 
            margin: 12px auto; 
            width: 100%; 
            border-radius: 6px; 
            font-weight: 500; 
            font-size: 14px;
            transition: all 0.15s ease-in-out; 
            box-sizing: border-box;
        }
        .link-btn:hover { 
            background: #ffffff; 
            transform: translateY(-0.5px);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>Chenabi Guy</h1>
        <p class="bio">Advocating for digital equity, infrastructure, and higher education initiatives.</p>

        <div class="section-title">Active Initiatives</div>
        <a class="link-btn" href="https://change.org" target="_blank">Establish Chenab Valley University</a>
        <a class="link-btn" href="https://change.org" target="_blank">Launch Starlink in Kashmir</a>

        <div class="section-title">Communication Channels</div>
        <a class="link-btn" href="https://x.com" target="_blank">X / Twitter</a>
        <a class="link-btn" href="https://instagram.com" target="_blank">Instagram</a>
    </div>

</body>
</html>
